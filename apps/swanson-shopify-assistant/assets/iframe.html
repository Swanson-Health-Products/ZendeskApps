<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swanson Shopify Assistant</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --border: #d8e0ea;
      --text: #1b2430;
      --muted: #5b6b80;
      --accent: #1e73e8;
      --good: #128a4a;
      --bad: #b42318;
      --btn-bg: #33461c;
      --btn-text: #ffffff;
      --btn-border: none;
      --btn-hover-bg: #2a3a16;
      --btn-hover-text: #ffffff;
      --btn-hover-border: #2a3a16;
      --btn-active-bg: #1f2a11;
      --btn-secondary-bg: #33461c;
      --btn-secondary-text: #ffffff;
      --btn-secondary-border: none;
      --btn-primary-update-bg: #57a345;
      --btn-nav-bg: #e6edf5;
      --btn-nav-text: #1b2430;
      --btn-nav-border: none;
      --btn-nav-active-bg: #33461c;
      --btn-nav-active-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 24px 28px 8px;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    p { margin: 0; color: var(--muted); }
    main { padding: 20px 28px 32px; display: grid; gap: 16px; }
    .module { display: none; }
    .module.active { display: block; }
    .module-nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .module-nav button {
      background: var(--btn-nav-bg);
      color: var(--btn-nav-text);
      border: var(--btn-nav-border);
      width: 100%;
    }
    .module-nav button.active {
      background: var(--btn-nav-active-bg);
      color: var(--btn-nav-active-text);
    }
    .module-nav button:hover,
    .module-nav button.clicked-hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 14px rgba(9, 30, 66, .08);
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font-size: 14px;
    }
    input[readonly] { color: var(--muted); }
    button {
      width: auto;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: var(--btn-border);
      background: var(--btn-bg);
      cursor: pointer;
      font-weight: 600;
      color: var(--btn-text);
      font-size: 14px;
      font-family: inherit;
    }
    button.primary-update {
      background: var(--btn-primary-update-bg);
    }
    button.secondary {
      background: var(--btn-secondary-bg);
      border: var(--btn-secondary-border);
      font-weight: 600;
      color: var(--btn-secondary-text);
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-compact {
      width: auto;
      min-width: 0;
      padding: 6px 10px;
    }
    .btn-compact:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .btn-compact.clicked {
      transform: translateY(1px);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2);
      background: var(--btn-active-bg);
      border-color: var(--btn-active-bg);
      color: var(--btn-hover-text);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 0 0 auto; }
    .status { font-size: 13px; color: var(--muted); }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .status.progress {
      font-weight: 700;
      background: linear-gradient(100deg, #0f7a44 0%, #19a764 45%, #0f7a44 90%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: status-shift 1.4s linear infinite;
    }
    button.is-working {
      position: relative;
      overflow: hidden;
      background: linear-gradient(110deg, #0f7a44 0%, #19a764 45%, #0f7a44 100%);
      background-size: 220% 100%;
      animation: button-shift 1.2s linear infinite;
      color: #fff;
    }
    button.is-working:disabled {
      opacity: 1;
      cursor: progress;
    }
    button.is-working::before {
      content: "";
      display: inline-block;
      width: 11px;
      height: 11px;
      margin-right: 7px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #ffffff;
      vertical-align: -1px;
      animation: spin 0.7s linear infinite;
    }
    button.is-working::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.35) 45%, transparent 70%);
      transform: translateX(-120%);
      animation: sheen 1.1s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes status-shift {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
    @keyframes button-shift {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes sheen {
      from { transform: translateX(-120%); }
      to { transform: translateX(130%); }
    }
    .list { margin: 0; padding: 0; list-style: none; }
    .list li { padding: 8px 0; border-bottom: 1px dashed var(--border); }
    .customer-profile {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #ffffff;
    }
    .customer-profile h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .profile-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 8px;
    }
    .profile-item {
      font-size: 12px;
      color: var(--muted);
    }
    .profile-item strong {
      display: block;
      font-size: 13px;
      color: var(--text);
    }
    .subscription-list {
      margin: 6px 0 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--text);
    }
    .inventory-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: #33461c;
      background: #edf6e7;
    }
    .inventory-badge.low {
      color: #7a4b00;
      background: #fff4e5;
      border-color: #f5c26b;
    }
    .inventory-badge.out {
      color: #b42318;
      background: #fdecec;
      border-color: #f0b5b5;
    }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); font-size: 12px; }
    .sku-card {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .sku-card img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .upsell-wrap {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
    }
    .upsell-toggle {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 10px;
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-text);
      font-weight: 600;
      border: var(--btn-secondary-border);
    }
    .upsell-toggle:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
    }
    .upsell-toggle .caret {
      font-size: 12px;
      color: #5b6b80;
    }
    .upsell-panel {
      display: none;
      padding: 10px;
      border-top: 1px solid var(--border);
    }
    .upsell-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .upsell-row {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      background: #fff;
    }
    .upsell-row img {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .upsell-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
    }
    .upsell-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .upsell-callout {
      margin-top: 6px;
      padding: 6px 8px;
      border: 1px solid #f0d9a7;
      border-radius: 8px;
      background: #fff8e8;
      color: #5f4c1b;
      font-size: 11px;
      line-height: 1.35;
    }
    .upsell-callout.urgent {
      border-color: #f3b5b5;
      background: #fff1f1;
      color: #7c1d1d;
    }
    .upsell-empty {
      font-size: 12px;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 8px 6px;
      font-size: 13px;
    }
    th { color: var(--muted); font-weight: 600; }
    .qty-input { max-width: 80px; }
    .invoice-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      line-height: 1.2;
      color: var(--accent);
    }
    .invoice-link.secondary {
      background: var(--btn-secondary-bg);
      border: var(--btn-secondary-border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--btn-secondary-text);
      text-decoration: none;
    }
    .invoice-link.secondary:visited,
    .invoice-link.secondary:active {
      color: var(--btn-secondary-text);
      text-decoration: none;
    }
    .invoice-link.secondary:hover,
    .invoice-link.secondary:focus-visible {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .price-strike {
      text-decoration: line-through;
      color: var(--muted);
      margin-right: 6px;
    }
    .price-new {
      font-weight: 600;
      color: var(--text);
    }
    .price-savings {
      display: block;
      font-size: 12px;
      color: #128a4a;
      margin-top: 4px;
    }
    .order-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      margin-top: 10px;
    }
    .order-card.is-hover {
      border-color: #33461c;
      box-shadow: 0 6px 16px rgba(51, 70, 28, 0.15);
      background: #f2f7ed;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      cursor: pointer;
    }
    .order-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .order-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      justify-content: flex-end;
    }
    .order-actions button {
      width: auto;
      min-width: 0;
      padding: 4px 8px;
      font-size: 12px;
    }
    .order-actions button:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .order-actions button.clicked {
      transform: translateY(1px);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2);
      background: var(--btn-active-bg);
      border-color: var(--btn-active-bg);
      color: var(--btn-hover-text);
    }
    .draft-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-top: 10px;
    }
    .draft-actions .left {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .draft-actions .right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .order-actions .invoice-link {
      font-size: 12px;
      align-self: center;
    }
    .order-expand-toggle {
      width: 28px;
      min-width: 28px;
      height: 28px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .order-items {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 10px;
    }
    #shipPreview {
      font-family: inherit;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      min-height: 84px;
      max-height: 180px;
      resize: vertical;
      overflow-y: auto;
    }
    .order-detail-section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f9fbfd;
      overflow: hidden;
    }
    .order-detail-title {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: #324459;
      background: #eef3f8;
      border-bottom: 1px solid var(--border);
    }
    .order-detail-list {
      display: grid;
      gap: 0;
    }
    .order-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #e6edf5;
    }
    .order-detail-row:last-child {
      border-bottom: none;
    }
    .detail-left {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      flex: 1;
    }
    .detail-thumb {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }
    .detail-thumb-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #7a8797;
      background: #f3f6f9;
      text-align: center;
      padding: 2px;
    }
    .detail-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 2px;
    }
    .detail-main {
      color: #1f2b37;
      font-weight: 600;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-meta {
      color: #52657b;
      font-size: 12px;
      white-space: nowrap;
    }
    .detail-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .detail-paid-label {
      font-size: 10px;
      color: #6d7c8f;
      text-transform: uppercase;
      letter-spacing: .02em;
    }
    .detail-paid-value {
      font-size: 12px;
      font-weight: 700;
      color: #233142;
    }
    .shipment-card {
      border-bottom: 1px solid #e6edf5;
      padding: 8px 10px;
      display: grid;
      gap: 6px;
    }
    .shipment-card:last-child {
      border-bottom: none;
    }
    .shipment-title {
      font-weight: 700;
      color: #1f2b37;
    }
    .shipment-track, .shipment-item, .shipment-note {
      font-size: 12px;
      color: #44586f;
      line-height: 1.35;
      word-break: break-word;
    }
    .shipment-track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .tracking-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #2f5da8;
      background: #eaf2ff;
      color: #1e4f9c;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .shipment-note {
      font-style: italic;
      color: #5b6b80;
    }
    .refund-panel {
      margin-top: 10px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
    }
    .refund-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text);
    }
    .refund-item input[type="number"] {
      max-width: 80px;
    }
    .refund-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .warning {
      background: #fff4e5;
      border: 1px solid #f5c26b;
      color: #7a4b00;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 10px;
    }
    .conversion-panel {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      display: none;
    }
    .conversion-panel.active {
      display: block;
    }
    .conversion-panel .status {
      margin-bottom: 8px;
    }
    .conversion-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .totals {
      margin-top: 12px;
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
    }
    a { color: var(--accent); }

    /* Zendesk side-panel compact overrides */
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --border: #e4e7ec;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0f7a44;
      --good: #0f7a44;
      --bad: #b42318;
      --btn-bg: #0f7a44;
      --btn-text: #ffffff;
      --btn-border: none;
      --btn-hover-bg: #2a3a16;
      --btn-hover-text: #ffffff;
      --btn-hover-border: #2a3a16;
      --btn-active-bg: #2a3a16;
      --btn-secondary-bg: #f8faf9;
      --btn-secondary-text: #1f2937;
      --btn-secondary-border: 1px solid #d0d5dd;
      --btn-primary-update-bg: #0f7a44;
      --btn-nav-bg: #ffffff;
      --btn-nav-text: #0f7a44;
      --btn-nav-border: 1px solid #cde8d7;
      --btn-nav-active-bg: #0f7a44;
      --btn-nav-active-text: #ffffff;
    }
    body {
      background: var(--bg);
      padding: 10px;
      font-size: 13px;
    }
    header {
      padding: 10px 12px;
      border: 1px solid #0f7a44;
      border-radius: 12px;
      background: linear-gradient(120deg, #0f7a44 0%, #168e53 100%);
      color: #ffffff;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: .01em;
    }
    header p {
      margin-top: 3px;
      color: rgba(255, 255, 255, .9);
      font-size: 11px;
    }
    main {
      padding: 0;
      gap: 8px;
    }
    .panel {
      border-radius: 12px;
      box-shadow: none;
      padding: 10px;
    }
    .top-nav-panel {
      border-color: #b4dfc5;
      background: rgba(15, 122, 68, 0.08);
      padding: 6px;
    }
    .module-nav {
      width: 100%;
      gap: 6px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .module-nav button {
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 8px;
    }
    h3 {
      margin: 0;
      font-size: 13px;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: #4b5563;
    }
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 4px;
    }
    .grid {
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    input, select, textarea {
      padding: 7px 9px;
      border-radius: 8px;
      font-size: 12px;
      border-color: #d7dce3;
    }
    .row {
      gap: 6px;
    }
    button,
    .btn-compact,
    .order-actions button {
      padding: 6px 10px;
      min-height: 30px;
      border-radius: 8px;
      font-size: 12px;
    }
    button.secondary:hover,
    button.secondary.clicked-hover,
    .invoice-link.secondary:hover,
    .invoice-link.secondary:focus-visible,
    .order-actions button:hover,
    .order-actions button.clicked,
    .order-actions button.clicked-hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
    }
    .order-actions button.is-working,
    .order-actions button.is-working:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-hover-text);
    }
    .status {
      font-size: 11px;
      margin-top: 6px;
    }
    .customer-profile,
    .order-card,
    .order-detail-section,
    .refund-panel {
      border-radius: 10px;
    }
    th, td {
      font-size: 11px;
      padding: 7px 6px;
    }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .totals {
      margin-top: 8px;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 6px;
    }
    details summary {
      font-size: 12px;
      color: #374151;
    }
    .draft-actions {
      gap: 8px;
      margin-top: 8px;
    }
    .warning {
      font-size: 11px;
      border-radius: 8px;
    }
    @media (max-width: 560px) {
      body {
        padding: 8px;
      }
      .module-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .totals {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel top-nav-panel">
      <div class="module-nav">
        <button id="navCustomer" class="btn-compact">Customer</button>
        <button id="navOrders" class="btn-compact">Orders</button>
        <button id="navOrder" class="btn-compact">Cart</button>
      </div>
    </section>

    <section class="panel" style="display:none;">
      <div class="status" id="apiStatus"></div>
    </section>

    <section class="panel module active" data-step="customer">
      <h3>Customer Lookup</h3>
      <div class="grid">
        <div>
          <label>First name</label>
          <input id="firstName" autocomplete="off" />
        </div>
        <div>
          <label>Last name</label>
          <input id="lastName" autocomplete="off" />
        </div>
        <div>
          <label>Email</label>
          <input id="email" placeholder="name@example.com" autocomplete="off" />
        </div>
        <div>
          <label>Phone</label>
          <input id="phone" placeholder="5551234567" autocomplete="off" />
        </div>
        <div>
          <label>Tags (comma separated)</label>
          <input id="tags" placeholder="vip, test" autocomplete="off" />
        </div>
        <div>
          <label>Swanson Customer ID</label>
          <input id="swansonId" placeholder="12345" autocomplete="off" />
        </div>
        <input id="customerId" type="hidden" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnSearchCustomer" class="btn-compact">Search</button>
        <button id="btnNewCustomer" class="btn-compact secondary">New Customer</button>
      </div>
      <div class="status" id="customerStatus"></div>
      <ul class="list" id="customerResults"></ul>
      <div class="row" style="margin-top:8px;">
        <button id="btnSelectFirstCustomer" class="btn-compact secondary" style="display:none;">Select First Result</button>
      </div>
      <div id="customerProfile" class="customer-profile" style="display:none;">
        <h4>Customer Profile</h4>
        <div id="customerProfileGrid" class="profile-grid"></div>
        <div style="margin-top:6px;">
          <strong style="font-size:12px;">Subscription Activity</strong>
          <ul id="customerSubscriptions" class="subscription-list"></ul>
        </div>
      </div>
      <div style="margin-top:10px;">
        <label>Agent Macros</label>
        <div class="row">
          <button class="btn-compact secondary macro-btn" data-macro="Refund initiated for customer request.">Refund Initiated</button>
          <button class="btn-compact secondary macro-btn" data-macro="Replacement order created and customer notified.">Replacement Sent</button>
          <button class="btn-compact secondary macro-btn" data-macro="Tracking details shared with customer.">Tracking Shared</button>
          <button class="btn-compact secondary macro-btn" data-macro="Escalated to fulfillment for manual review.">Escalated</button>
        </div>
        <div class="status" id="macroStatus"></div>
      </div>

      <details id="newCustomerPanel" style="margin-top:12px;">
        <summary style="cursor:pointer; font-weight:600;">Create New Customer</summary>
        <div class="grid" style="margin-top:10px;">
          <div>
            <label>Customer name</label>
            <input id="newCustomerName" placeholder="First Last" />
          </div>
          <div>
            <label>Phone</label>
            <input id="newCustomerPhone" placeholder="5551234567" />
          </div>
          <div>
            <label>Email</label>
            <div class="row" style="margin-top:6px;">
              <input id="newCustomerEmail" placeholder="name@example.com" />
              <button id="btnNoEmail" class="btn-compact secondary">No Email</button>
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="btnCreateCustomer" class="btn-compact primary-update">Create Customer</button>
        </div>
        <div class="status" id="newCustomerStatus"></div>
      </details>

      <div style="margin-top:12px;" class="grid">
        <div>
          <label>Saved Addresses</label>
          <select id="addressSelect"></select>
        </div>
        <div>
          <label>Ship To (preview)</label>
          <textarea id="shipPreview" rows="3" readonly></textarea>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnCustomerNext" class="btn-compact">Next: Orders</button>
      </div>
      <details style="margin-top:12px;">
        <summary style="cursor:pointer; font-weight:600;">Add New Address</summary>
        <div class="grid">
          <div>
            <label>Name</label>
            <input id="addrName" />
          </div>
          <div>
            <label>Phone</label>
            <input id="addrPhone" />
          </div>
          <div>
            <label>Address 1</label>
            <input id="addr1" />
          </div>
          <div>
            <label>Address 2</label>
            <input id="addr2" />
          </div>
          <div>
            <label>City</label>
            <input id="addrCity" />
          </div>
          <div>
            <label>Province/State</label>
            <input id="addrProvince" />
          </div>
          <div>
            <label>Postal Code</label>
            <input id="addrZip" />
          </div>
          <div>
            <label>Country</label>
            <input id="addrCountry" value="United States" />
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="secondary" id="btnAddAddress">Add Address</button>
          <label style="display:flex; align-items:center; gap:6px; font-size:12px;">
            <input type="checkbox" id="addrDefault" />
            Set as default
          </label>
        </div>
        <div class="status" id="addrStatus"></div>
      </details>
    </section>

    <section class="panel module" data-step="orders">
      <h3>Recent Orders</h3>
      <div class="row" style="margin-top:10px;">
        <button id="btnNewOrder" class="btn-compact">New Order</button>
      </div>
      <div class="status" id="ordersStatus"></div>
      <div id="ordersList"></div>
    </section>

    <section class="panel module" data-step="order">
      <h3>Draft Builder</h3>
      <div class="grid">
        <div>
          <label>Search (SKU or product name)</label>
          <input id="sku" value="SW1864" />
        </div>
        <div>
          <label>Quantity</label>
          <input id="skuQty" value="1" />
        </div>
        <div>
          <label>Price</label>
          <input id="variantPrice" readonly />
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnLookupSku">Search</button>
        <button class="secondary" id="btnAddSku">Add To Order</button>
      </div>
      <div class="status" id="skuStatus"></div>
      <div id="skuCard"></div>
      <div id="productResults"></div>
      <div class="upsell-wrap">
        <button id="btnUpsellToggle" class="upsell-toggle" type="button" aria-expanded="false" aria-controls="upsellPanel">
          <span id="upsellToggleText">Upsell ideas (0)</span>
          <span class="caret" id="upsellCaret">▸</span>
        </button>
        <div id="upsellPanel" class="upsell-panel">
          <div id="upsellStatus" class="status"></div>
          <div id="upsellList" class="upsell-list"></div>
        </div>
      </div>

      <div style="margin-top:16px;"></div>
      <h3>Draft Order</h3>
      <input id="draftOrderId" type="hidden" />
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>SKU</th>
            <th>Title</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Qty</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="orderItems"></tbody>
      </table>

      <div style="margin-top:12px;" class="grid">
        <div>
          <label>Promo Code</label>
          <input id="promoCode" placeholder="e.g. SAVE50" />
        </div>
        <div>
          <label>Shipping Speed</label>
          <select id="shippingSpeed">
            <option value="">Select speed...</option>
            <option value="Standard Shipping">Standard Shipping</option>
            <option value="Expedited Shipping">Expedited Shipping</option>
            <option value="2-Day Shipping">2-Day Shipping</option>
            <option value="Overnight Shipping">Overnight Shipping</option>
          </select>
        </div>
        <div>
          <label>Shipping Cost (USD, auto)</label>
          <input id="shippingCost" readonly placeholder="Auto-calculated" />
        </div>
        <div>
          <label style="display:flex; align-items:center; gap:6px; margin-top:24px;">
            <input id="freeShipping" type="checkbox" style="width:auto;" />
            Free shipping
          </label>
        </div>
      </div>
      <div class="status" id="promoStatus"></div>

      <div class="totals">
        <div>
          <label>Subtotal</label>
          <input id="subtotal" readonly />
        </div>
        <div>
          <label>Tax</label>
          <input id="totalTax" readonly />
        </div>
        <div>
          <label>Total</label>
          <input id="total" readonly />
        </div>
      </div>

      <div class="draft-actions">
        <div class="left">
          <button id="btnCreateDraft" class="primary-update">Create Draft Order</button>
        </div>
        <div class="right">
          <label style="font-size:12px; color: var(--muted);">Invoice</label>
          <input id="invoiceUrl" type="hidden" />
          <a id="invoiceLink" class="invoice-link secondary btn-compact" target="_blank" rel="noopener" style="display:none;">Open Invoice</a>
          <button id="btnCopyInvoiceUrl" class="secondary btn-compact" type="button" style="display:none;">Copy URL</button>
        </div>
      </div>
      <div id="conversionPanel" class="conversion-panel">
        <div class="status" id="conversionStatus"></div>
        <div class="conversion-actions">
          <button id="btnRefreshOrdersFromConversion" class="secondary btn-compact" type="button">Refresh Orders</button>
          <button id="btnStopConversionPolling" class="secondary btn-compact" type="button">Stop Checking</button>
        </div>
      </div>
      <div id="addressValidation" class="warning" style="display:none;"></div>
      <label id="addressOverrideWrap" style="display:none; margin-top:8px; font-size:12px; color: var(--muted);">
        <input id="addressOverride" type="checkbox" style="width:auto; margin-right:6px;" />
        Proceed anyway despite address validation warning
      </label>
      <div id="shipWarning" class="warning" style="display:none;"></div>
      <div class="status" id="draftStatus"></div>
    </section>
  </main>

  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
